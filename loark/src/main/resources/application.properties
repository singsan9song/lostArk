spring.application.name=loark
server.port=${PORT:8081}
lostark.api.base-url=${LOSTARK_API_BASE_URL:https://developer-lostark.game.onstove.com}
lostark.api.key=${LOSTARK_API_KEY:}
lostark.mari-shop.base-url=${LOSTARK_MARI_SHOP_BASE_URL:https://m-lostark.game.onstove.com}
lostark.mari-shop.cdn-base-url=${LOSTARK_CDN_BASE_URL:https://cdn-lostark.game.onstove.com/}
discord.cdn.avatar-base-url=${DISCORD_CDN_AVATAR_BASE_URL:https://cdn.discordapp.com/avatars/}
app.community.admin-discord-ids=${COMMUNITY_ADMIN_DISCORD_IDS:}
app.frontend-origin=${FRONTEND_ORIGIN:http://localhost:5173}
app.price-cache-ttl-seconds=${PRICE_CACHE_TTL_SECONDS:60}
app.mari-shop.enabled=${MARI_SHOP_ENABLED:true}
app.drop-legacy-tables=${DROP_LEGACY_TABLES:true}
spring.datasource.url=${DB_URL:jdbc:h2:file:./data/loark-cache;AUTO_SERVER=TRUE}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.security.oauth2.client.registration.discord.client-id=${DISCORD_CLIENT_ID:replace_me}
spring.security.oauth2.client.registration.discord.client-secret=${DISCORD_CLIENT_SECRET:replace_me}
spring.security.oauth2.client.registration.discord.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.discord.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.registration.discord.scope=identify
spring.security.oauth2.client.provider.discord.authorization-uri=https://discord.com/oauth2/authorize
spring.security.oauth2.client.provider.discord.token-uri=https://discord.com/api/oauth2/token
spring.security.oauth2.client.provider.discord.user-info-uri=https://discord.com/api/users/@me
spring.security.oauth2.client.provider.discord.user-name-attribute=id
